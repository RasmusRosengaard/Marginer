<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 162 40">
  <defs>
    <linearGradient id="gp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a94c"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="gemFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#3b0764" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagonal gem (pointy-top), center (20,20), radius 17 -->
  <polygon
    points="20,3 34.7,11.5 34.7,28.5 20,37 5.3,28.5 5.3,11.5"
    fill="url(#gemFill)"
    stroke="url(#gp)"
    stroke-width="1.3"
  />

  <!-- Upper facet lines from apex -->
  <line x1="20" y1="3"    x2="20"   y2="20" stroke="url(#gp)" stroke-width="0.5" opacity="0.35"/>
  <line x1="34.7" y1="11.5" x2="20" y2="20" stroke="url(#gp)" stroke-width="0.5" opacity="0.35"/>
  <line x1="5.3"  y1="11.5" x2="20" y2="20" stroke="url(#gp)" stroke-width="0.5" opacity="0.35"/>

  <!-- M lettermark inside gem -->
  <text
    x="20" y="26"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="15"
    font-weight="900"
    fill="url(#gp)"
    filter="url(#glow)"
  >M</text>

  <!-- Wordmark -->
  <text
    x="46" y="27"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="19"
    font-weight="800"
    letter-spacing="0.3"
    fill="url(#gp)"
    filter="url(#glow)"
  >arginer</text>
</svg>
